# ─── EVENTO ──────────────────────────────────────────────────────────────────
spring.application.name=evento
server.port=8083
 
# ─── BASE DE DATOS ────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/banqueteria_evento?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=ninoword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# ─── JPA / HIBERNATE ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
 
# ─── FLYWAY ──────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
 
# ─── WEBCLIENT — URLs de microservicios externos ─────────────────────────────
# Rellena estas URLs con las rutas reales de cada microservicio
webclient.ingredientes.base-url=http://localhost:8081
webclient.cuentainfo.base-url=http://localhost:8082