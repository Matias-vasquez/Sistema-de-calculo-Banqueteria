server:
  port: 9091
  
spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: ingredientes
          uri: http://localhost:8081
          predicates:
            - Path=/api/ingrediente/**, /api/pastel/**, /api/platillo/**, /api/bebestible/**
 
        - id: cuentainfo
          uri: http://localhost:8082
          predicates:
            - Path=/api/role/**, /api/cuenta/**, /api/datos-usuario/**
 
        - id: evento
          uri: http://localhost:8083
          predicates:
            - Path=/api/evento/**, /api/acta/**, /api/dietas-alergia/**
 